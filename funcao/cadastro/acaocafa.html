<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cadastro de Famílias</title>
  <link rel="icon" href="assets/favicon.ico" type="image/x-icon" />
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
  <style>
    :root {
      --cor-primaria: #ff7f0e;
      --cor-secundaria: #007bff;
      --fundo-principal: #ffffff;
      --cinza-claro: #f0f2f5;
      --cinza-medio: #ced4da;
      --cinza-escuro: #495057;
      --sombra-leve: rgba(0, 0, 0, 0.08);
      --sombra-media: rgba(0, 0, 0, 0.15);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background-color: var(--fundo-principal);
      margin: 0;
      padding: 0;
      line-height: 1.6;
      color: var(--cinza-escuro);
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 60px;
      margin-bottom: 40px;
      position: relative;
    }

    header h1 {
      font-size: 2.8rem;
      color: var(--cor-primaria);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin: 0;
      text-align: center;
    }

    .form-section {
      max-width: 800px;
      background-color: white;
      margin: 20px auto;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 10px 30px var(--sombra-media);
      border-top: 5px solid var(--cor-primaria);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    .form-group label {
      margin-bottom: 8px;
      font-weight: 500;
      color: var(--cinza-escuro);
      font-size: 0.95rem;
    }

    input,
    select {
      padding: 14px;
      font-size: 1.05rem;
      border-radius: 8px;
      border: 1px solid var(--cinza-medio);
      width: 100%;
      transition: all 0.3s ease;
      background-color: #fdfdfd;
    }

    input:focus,
    select:focus {
      border-color: var(--cor-primaria);
      box-shadow: 0 0 0 3px rgba(255, 127, 14, 0.25);
      outline: none;
    }

    .localidade-group {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .localidade-group select {
      flex: 1.5; /* Increased size for select */
    }

    .localidade-group input {
      flex: 2; /* Increased size for input */
    }

    .localidade-group button {
      padding: 10px 16px; /* Reduced padding for smaller button */
      font-size: 0.9rem; /* Smaller font size */
      font-weight: 600;
      color: #fff;
      background-color: var(--cor-primaria);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
      flex: 0.8; /* Reduced size for button */
    }

    .localidade-group button:hover {
      background-color: var(--cor-secundaria);
      transform: translateY(-2px);
    }

    .button-row {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      flex-wrap: wrap;
      gap: 10px;
    }

    button {
      padding: 14px 25px;
      font-size: 1.05rem;
      font-weight: 600;
      color: #fff;
      background-color: var(--cor-primaria);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 5px 15px var(--sombra-leve);
      transition: all 0.3s ease;
    }

    button:hover {
      background-color: var(--cor-secundaria);
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--sombra-media);
    }

    .btn-salvar {
      background-color: var(--cor-primaria);
    }

    .btn-fichas {
      background-color: var(--cor-secundaria);
    }

    @media (max-width: 768px) {
      .form-section {
        margin: 20px 15px;
        padding: 30px 20px;
      }

      header h1 {
        font-size: 2.2rem;
      }

      .form-grid {
        grid-template-columns: 1fr;
      }

      .button-row {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
      }

      .localidade-group {
        flex-direction: column;
        align-items: stretch;
      }

      .localidade-group select,
      .localidade-group input,
      .localidade-group button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <script type="module">
    import { auth } from '../../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "../../index.html";
      }
    });
  </script>
  <header>
    <h1>Cadastro de Famílias</h1>
  </header>
  <main>
    <div class="form-section">
      <div class="form-grid">
        <div class="form-group">
          <label for="liderFamilia">Líder de Família</label>
          <input type="text" id="liderFamilia" placeholder="Líder de Família" />
        </div>
        <div class="form-group">
          <label for="cpfLider">CPF do Líder</label>
          <input type="text" id="cpfLider" placeholder="CPF do Líder" maxlength="14" inputmode="numeric" pattern="\d*" oninput="mascaraCPF(this)" />
        </div>
        <div class="form-group">
          <label for="numeroContato">Telefone de Contato</label>
          <input type="text" id="numeroContato" placeholder="Telefone de Contato" maxlength="15" inputmode="numeric" pattern="\d*" oninput="mascaraTelefone(this)" />
        </div>
        <div class="form-group">
          <label for="dataNascimentoLider">Data de Nascimento (dd/mm/aaaa)</label>
          <input type="text" id="dataNascimentoLider" placeholder="Data de Nascimento (dd/mm/aaaa)" maxlength="10" inputmode="numeric" oninput="mascaraData(this)" />
        </div>
        <div class="form-group">
          <label for="tituloEleitorLider">Título de Eleitor do Líder</label>
          <input type="text" id="tituloEleitorLider" placeholder="Título de Eleitor do Líder" maxlength="14" inputmode="numeric" pattern="\d*" oninput="mascaraTitulo(this)" />
        </div>
        <div class="form-group">
          <label for="zonaLider">Zona do Líder</label>
          <input type="text" id="zonaLider" placeholder="Zona do Líder" maxlength="4" inputmode="numeric" pattern="\d*" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,4)" />
        </div>
        <div class="form-group">
          <label for="secaoLider">Seção do Líder</label>
          <input type="text" id="secaoLider" placeholder="Seção do Líder" maxlength="4" inputmode="numeric" pattern="\d*" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,4)" />
        </div>
        <div class="form-group">
          <label for="nomeEsposa">Nome do(a) Cônjuge</label>
          <input type="text" id="nomeEsposa" placeholder="Nome do(a) Cônjuge" />
        </div>
        <div class="form-group">
          <label for="cpfEsposa">CPF do(a) Cônjuge</label>
          <input type="text" id="cpfEsposa" placeholder="CPF do(a) Cônjuge" maxlength="14" inputmode="numeric" pattern="\d*" oninput="mascaraCPF(this)" />
        </ prefixes="og: http://ogp.me/ns#">
        <div class="form-group">
          <label for="tituloEleitorEsposa">Título de Eleitor do(a) Cônjuge (opcional)</label>
          <input type="text" id="tituloEleitorEsposa" placeholder="Título de Eleitor do(a) Cônjuge (opcional)" maxlength="14" inputmode="numeric" pattern="\d*" oninput="mascaraTitulo(this)" />
        </div>
        <div class="form-group">
          <label for="zonaEsposa">Zona do(a) Cônjuge (opcional)</label>
          <input type="text" id="zonaEsposa" placeholder="Zona do(a) Cônjuge (opcional)" maxlength="4" inputmode="numeric" pattern="\d*" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,4)" />
        </div>
        <div class="form-group">
          <label for="secaoEsposa">Seção do(a) Cônjuge (opcional)</label>
          <input type="text" id="secaoEsposa" placeholder="Seção do(a) Cônjuge (opcional)" maxlength="4" inputmode="numeric" pattern="\d*" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,4)" />
        </div>
        <div class="form-group">
          <label for="filhos">Filhos</label>
          <input type="text" id="filhos" placeholder="Filhos" maxlength="2" inputmode="numeric" pattern="\d*" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0,2)" />
        </div>
        <div class="form-group localidade-group">
          <label for="localidadeSelect">Comunidade</label>
          <div style="display: flex; gap: 8px;">
            <select id="localidadeSelect">
              <option value="">Selecione uma comunidade</option>
            </select>
            <input type="text" id="novaLocalidade" placeholder="Nova comunidade" />
            <button onclick="adicionarLocalidade()">Adicionar</button>
          </div>
        </div>
      </div>
      <div class="button-row">
        <button class="btn-salvar" onclick="adicionarFicha()">Salvar</button>
        <button class="btn-fichas" onclick="window.location.href='fichacafa.html'">Registros</button>
      </div>
    </div>
  </main>
  <script>
    const firebaseConfig = {
    apiKey: "AIzaSyC5wHhdIZlY9txtYkN88R-67lIP5FZlFpY",
    authDomain: "mtag-1c04d.firebaseapp.com",
    projectId: "mtag-1c04d",
    storageBucket: "mtag-1c04d.firebasestorage.app",
    messagingSenderId: "487741931549",
    appId: "1:487741931549:web:cf45afe3c7b5cda7de06f4"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    async function carregarLocalidades() {
      const select = document.getElementById("localidadeSelect");
      select.innerHTML = `<option value="">Selecione uma comunidade</option>`;
      const snapshot = await db.collection("comunidades").orderBy("nome").get();
      snapshot.forEach(doc => {
        const option = document.createElement("option");
        option.value = doc.data().nome;
        option.textContent = doc.data().nome;
        select.appendChild(option);
      });
    }

    async function adicionarLocalidade() {
      const nova = document.getElementById("novaLocalidade").value.trim();
      if (!nova) return alert("Informe o nome da nova comunidade.");
      const existente = await db.collection("comunidades").where("nome", "==", nova).get();
      if (!existente.empty) return alert("Essa comunidade já existe.");

      await db.collection("comunidades").add({ nome: nova });
      alert("Comunidade adicionada com sucesso.");
      document.getElementById("novaLocalidade").value = "";
      carregarLocalidades();
    }

    window.onload = carregarLocalidades;

    function mascaraCPF(input) {
      let v = input.value.replace(/\D/g, "").slice(0, 11);
      v = v.replace(/(\d{3})(\d)/, "$1.$2");
      v = v.replace(/(\d{3})(\d)/, "$1.$2");
      v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
      input.value = v;
    }

    function mascaraTitulo(input) {
      let v = input.value.replace(/\D/g, "").slice(0, 12);
      v = v.replace(/(\d{4})(\d{4})(\d{0,4})/, "$1 $2 $3").trim();
      input.value = v;
    }

    function mascaraTelefone(input) {
      let v = input.value.replace(/\D/g, "").slice(0, 11);
      if (v.length >= 11) {
        input.value = v.replace(/^(\d{2})(\d{5})(\d{4})$/, "($1) $2-$3");
      } else {
        input.value = v.replace(/^(\d{2})(\d{4,5})?(\d{0,4})?/, (match, p1, p2, p3) => {
          let res = `(${p1}`;
          if (p2) res += `) ${p2}`;
          if (p3) res += `-${p3}`;
          return res;
        });
      }
    }

    function mascaraData(input) {
      let v = input.value.replace(/\D/g, "").slice(0, 8);
      v = v.replace(/(\d{2})(\d)/, "$1/$2");
      v = v.replace(/(\d{2})\/(\d{2})(\d)/, "$1/$2/$3");
      input.value = v;
    }

    function validarCPF(cpf) {
      cpf = cpf.replace(/[^\d]+/g, '');
      if (cpf.length !== 11 || /^(\d)\1+$/.test(cpf)) return false;
      let soma = 0;
      for (let i = 0; i < 9; i++) soma += parseInt(cpf.charAt(i)) * (10 - i);
      let resto = 11 - (soma % 11);
      if (resto >= 10) resto = 0;
      if (resto !== parseInt(cpf.charAt(9))) return false;
      soma = 0;
      for (let i = 0; i < 10; i++) soma += parseInt(cpf.charAt(i)) * (11 - i);
      resto = 11 - (soma % 11);
      if (resto >= 10) resto = 0;
      return resto === parseInt(cpf.charAt(10));
    }

    async function adicionarFicha() {
      const liderFamilia = document.getElementById('liderFamilia').value.trim();
      const cpfLider = document.getElementById('cpfLider').value.trim();
      const numeroContato = document.getElementById('numeroContato').value.trim();
      const dataNascimentoLider = document.getElementById('dataNascimentoLider').value.trim();
      const tituloEleitorLider = document.getElementById('tituloEleitorLider').value.trim();
      const zonaLider = document.getElementById('zonaLider').value.trim();
      const secaoLider = document.getElementById('secaoLider').value.trim();
      const nomeEsposa = document.getElementById('nomeEsposa').value.trim();
      const cpfEsposa = document.getElementById('cpfEsposa').value.trim();
      const tituloEleitorEsposa = document.getElementById('tituloEleitorEsposa').value.trim();
      const zonaEsposa = document.getElementById('zonaEsposa').value.trim();
      const secaoEsposa = document.getElementById('secaoEsposa').value.trim();
      const filhos = document.getElementById('filhos').value.trim();
      const localidade = document.getElementById('localidadeSelect').value;

      if (!liderFamilia || !cpfLider || !numeroContato || !dataNascimentoLider || !tituloEleitorLider || !zonaLider || !secaoLider || !localidade) {
        alert('Preencha todos os campos obrigatórios.');
        return;
      }

      if (!validarCPF(cpfLider)) {
        alert('CPF do líder inválido.');
        return;
      }

      if (cpfEsposa && !validarCPF(cpfEsposa)) {
        alert('CPF do(a) cônjuge inválido.');
        return;
      }

      try {
        await db.collection('fichas_acaoexecutada').add({
          liderFamilia,
          cpfLider,
          numeroContato,
          dataNascimentoLider,
          tituloEleitorLider,
          zonaLider,
          secaoLider,
          nomeEsposa: nomeEsposa || null,
          cpfEsposa: cpfEsposa || null,
          tituloEleitorEsposa: tituloEleitorEsposa || null,
          zonaEsposa: zonaEsposa || null,
          secaoEsposa: secaoEsposa || null,
          filhos: filhos || null,
          localidade,
          timestamp: firebase.firestore.FieldValue.serverTimestamp(),
        });

        alert('Ficha salva com sucesso!');
        document.querySelectorAll("input").forEach(el => el.value = '');
        document.getElementById("localidadeSelect").value = "";
      } catch (error) {
        console.error('Erro ao salvar ficha:', error);
        alert('Erro ao salvar ficha. Veja o console para mais detalhes.');
      }
    }
  </script>
</body>
</html>
