<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Adivinhe a Bola com Apostas</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap');

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
      font-size: 20px;
      position: relative;
      background: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(270deg, rgba(255, 210, 221, 0.5), rgba(202, 236, 255, 0.5), rgba(214, 255, 210, 0.5), rgba(255, 239, 202, 0.5));
      background-size: 800% 800%;
      animation: gradientBG 60s ease infinite;
      z-index: -2;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-bottom: 10px;
      font-size: 3rem;
      color: #222;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }

    #status {
      margin-bottom: 10px;
      font-weight: 700;
    }

    #game {
      position: relative;
      width: 320px;
      height: 200px;
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
    }

    .cup {
      width: 60px;
      height: 80px;
      background: #fff;
      border-radius: 0 0 50% 50%;
      position: absolute;
      bottom: 0;
      cursor: pointer;
      transition: transform 0.3s ease-in-out, left 0.3s ease-in-out;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
    }

    .cup:hover {
      background: #f0f0f0;
    }

    .cup.lifted {
      transform: translateY(-70px);
    }

    .cup.disabled {
      pointer-events: none;
    }

    .ball {
      position: absolute;
      width: 30px;
      height: 30px;
      background: black;
      border-radius: 50%;
      bottom: 10px;
      left: 0;
      right: 0;
      margin: auto;
      z-index: -1;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 16px;
      color: white;
      font-family: Arial, sans-serif;
    }

    #message {
      margin-top: 20px;
      font-size: 1.5rem;
      min-height: 40px;
    }

    .bet-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
      font-size: 1.25rem;
    }

    input {
      padding: 10px;
      font-size: 1.25rem;
      width: 120px;
      text-align: center;
      border-radius: 8px;
      border: 2px solid #ccc;
      transition: border-color 0.3s ease;
    }

    input:focus {
      border-color: #3498db;
      outline: none;
    }

    .buttons {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    button {
      padding: 12px 25px;
      font-size: 1.25rem;
      border: none;
      border-radius: 8px;
      background-color: #1c3f60;
      color: white;
      cursor: pointer;
      font-weight: 700;
      box-shadow: 0 4px 8px rgba(28, 63, 96, 0.4);
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #15405f;
    }

    #flash {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 200, 255, 0.6);
      pointer-events: none;
      opacity: 0;
      animation-fill-mode: forwards;
      z-index: 9999;
    }

    @keyframes flashEffect {
      0% { opacity: 0.8; }
      100% { opacity: 0; }
    }

    #winText {
      position: fixed;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 6rem;
      font-weight: bold;
      opacity: 0;
      z-index: 10000;
      color: white;
      -webkit-text-stroke: 3px black;
      text-shadow:
        3px 3px 5px black,
        -3px 3px 5px black,
        3px -3px 5px black,
        -3px -3px 5px black;
      font-family: 'Comic Neue', 'Comic Sans MS', cursive, sans-serif;
      animation: none;
      user-select: none;
      pointer-events: none;
    }

    @keyframes winTextShow {
      0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      50% { transform: translate(-50%, -50%) scale(1.4); opacity: 1; }
      100% { transform: translate(-50%, -30%) scale(1); opacity: 0; }
    }
  </style>
</head>
<body>
    <script type="module">
    import { auth } from '../../js/firebase-config.js';
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        // Se não estiver logado, redireciona para login
        window.location.href = "../../index.html";
      }
    });
  </script>
  <h1>Onde está a bola?</h1>
  <div id="status">
    Pontos: <span id="score">100</span> | Recorde: <span id="highScore">100</span>
  </div>
  <div class="bet-controls">
    <button onclick="ajustarAposta(-5)">-5</button>
    <input type="number" id="bet" value="10" min="1" />
    <button onclick="ajustarAposta(5)">+5</button>
  </div>
  <div id="game"></div>
  <div id="message">Digite sua aposta e clique em uma tampa!</div>
  <div class="buttons">
    <button onclick="startGame()">Jogar</button>
    <button onclick="desistir()">Desistir</button>
  </div>

  <div id="flash"></div>
  <div id="winText">🎯 ACERTOU! 🎯</div>
  <audio id="winSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_b98a481376.mp3?filename=success-fanfare-trumpets-6185.mp3"></audio>

  <script>
    const gameContainer = document.getElementById("game");
    const message = document.getElementById("message");
    const scoreSpan = document.getElementById("score");
    const highScoreSpan = document.getElementById("highScore");
    const betInput = document.getElementById("bet");
    const flash = document.getElementById("flash");
    const winText = document.getElementById("winText");

    const cupPositions = [20, 90, 160, 230];
    let cups = [];
    let ballIndex = 0;
    let canClick = false;
    let score = 300;
    let highScore = localStorage.getItem("recorde") ? parseInt(localStorage.getItem("recorde")) : 300;

    function updateScores() {
      scoreSpan.textContent = score;
      highScoreSpan.textContent = highScore;
      localStorage.setItem("recorde", highScore);
    }

    function ajustarAposta(valor) {
      const atual = parseInt(betInput.value) || 0;
      let novo = atual + valor;
      if (novo < 1) novo = 1;
      if (novo > score) novo = score;
      betInput.value = novo;
    }

    function createGame() {
      gameContainer.innerHTML = "";
      cups = [];
      for (let i = 0; i < 4; i++) {
        const cup = document.createElement("div");
        cup.classList.add("cup");
        cup.style.left = `${cupPositions[i]}px`;
        cup.dataset.index = i;
        cup.addEventListener("click", checkCup);
        cups.push(cup);
        gameContainer.appendChild(cup);
      }
      const ball = document.createElement("div");
      ball.classList.add("ball");
      ball.textContent = "8";
      cups[ballIndex].appendChild(ball);
    }

    function shuffleCups() {
      canClick = false;
      message.textContent = "Embaralhando...";
      cups.forEach(cup => cup.classList.add("disabled"));

      let moves = 15;
      let moveCount = 0;
      const shuffleInterval = setInterval(() => {
        const i = Math.floor(Math.random() * 4);
        const j = Math.floor(Math.random() * 4);
        if (i === j) return;
        const temp = cupPositions[i];
        cupPositions[i] = cupPositions[j];
        cupPositions[j] = temp;
        cups[i].style.left = `${cupPositions[i]}px`;
        cups[j].style.left = `${cupPositions[j]}px`;
        moveCount++;
        if (moveCount >= moves) {
          clearInterval(shuffleInterval);
          cups.forEach(cup => cup.classList.remove("disabled"));
          canClick = true;
          message.textContent = "Clique em uma tampa!";
        }
      }, 200);
    }

    function checkCup(e) {
      if (!canClick) return;
      const bet = parseInt(betInput.value);
      if (isNaN(bet) || bet <= 0 || bet > score) {
        message.textContent = "Aposta inválida!";
        return;
      }
      const selected = parseInt(e.currentTarget.dataset.index);
      canClick = false;
      cups.forEach((cup) => cup.classList.add("lifted"));
      if (selected === ballIndex) {
        const ganho = bet * 2;
        score += ganho;
        message.textContent = `🎉 Acertou! Ganhou ${ganho} pontos.`;
        showFlash();
        showWinText();
      } else {
        score -= bet;
        message.textContent = `❌ Errou! Perdeu ${bet} pontos.`;
      }
      if (score > highScore) highScore = score;
      updateScores();
      if (score <= 0) {
        message.textContent += " 💀 Você zerou os pontos! Fim de jogo.";
        canClick = false;
      }
    }

    function startGame() {
      if (score <= 0) {
        message.textContent = "Você não tem pontos. Recarregue a página.";
        return;
      }
      const bet = parseInt(betInput.value);
      if (isNaN(bet) || bet <= 0 || bet > score) {
        message.textContent = "Aposta inválida!";
        return;
      }
      ballIndex = Math.floor(Math.random() * 4);
      createGame();
      setTimeout(shuffleCups, 500);
    }

    function desistir() {
      message.textContent = `Você desistiu com ${score} pontos. Recorde: ${highScore}`;
      if (score > highScore) highScore = score;
      updateScores();
      canClick = false;
    }

    function showFlash() {
      flash.style.animation = "none";
      flash.offsetHeight;
      flash.style.animation = "flashEffect 0.5s ease forwards";

      const winSound = document.getElementById("winSound");
      if (winSound) {
        winSound.currentTime = 0;
        winSound.play().catch(() => {});
      }

      if (navigator.vibrate) navigator.vibrate(300);
    }

    function showWinText() {
      winText.style.animation = "none";
      winText.offsetHeight;
      winText.style.animation = "winTextShow 2s ease-out forwards";
    }

    updateScores();
    createGame();
  </script>
</body>
</html>
